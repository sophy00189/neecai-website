<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>Neecai 网站管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--accent:#ff6b35;--accent2:#ff8c42;--blue:#38bdf8;--green:#22c55e;--red:#ef4444;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--border:#475569;--radius:10px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:20px;display:flex;align-items:center;gap:10px}
.header h1 i{color:var(--accent);font-size:22px}
.header-actions{display:flex;gap:10px;align-items:center}
.btn{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-success{background:var(--green);color:#fff}.btn-success:hover{opacity:.9}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{opacity:.9}
.btn-secondary{background:var(--bg3);color:var(--text)}.btn-secondary:hover{background:var(--border)}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{opacity:.9}
.layout{display:flex;min-height:calc(100vh - 60px)}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);padding:12px 0;flex-shrink:0}
.nav-item{padding:12px 20px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text2);transition:all .2s;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,107,53,.06);color:var(--text)}
.nav-item.active{background:rgba(255,107,53,.1);color:var(--accent);border-left-color:var(--accent)}
.nav-item i{width:18px;text-align:center;font-size:15px}
.main{flex:1;padding:24px;overflow-y:auto;max-height:calc(100vh - 60px)}
.panel{display:none}.panel.active{display:block}
.panel-title{font-size:22px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.panel-title i{color:var(--accent)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;cursor:pointer}
.card-header h3{font-size:16px;display:flex;align-items:center;gap:8px}
.card-header h3 i{color:var(--accent);font-size:14px}
.card-toggle{color:var(--text3);font-size:12px}
.card-body{display:grid;gap:14px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;color:var(--text2);font-weight:600}
.form-group input,.form-group textarea,.form-group select{padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border .2s}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--accent)}
.form-group textarea{resize:vertical;min-height:60px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-row-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}
.lang-tabs{display:flex;gap:4px;margin-bottom:12px;background:var(--bg);border-radius:8px;padding:4px}
.lang-tab{padding:6px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;background:transparent;color:var(--text3);transition:all .2s}
.lang-tab.active{background:var(--accent);color:#fff}
.img-upload{border:2px dashed var(--border);border-radius:var(--radius);padding:24px;text-align:center;cursor:pointer;transition:all .2s;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.img-upload:hover{border-color:var(--accent);background:rgba(255,107,53,.04)}
.img-upload input{display:none}
.img-upload i.fa-cloud-upload-alt{font-size:28px;color:var(--text3);margin-bottom:8px}
.img-upload p{font-size:13px;color:var(--text3)}
/* 图片编辑器 */
.img-editor{background:#111827;border:2px solid var(--accent);border-radius:12px;overflow:hidden;margin:8px 0}
.img-editor-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(255,107,53,.1);border-bottom:1px solid rgba(255,107,53,.2);font-size:12px;color:var(--accent2)}
.img-editor-info{display:flex;align-items:center;gap:12px}
.img-editor-canvas{position:relative;width:100%;height:280px;background:repeating-conic-gradient(#1e293b 0% 25%,#0f172a 0% 50%) 50%/16px 16px;overflow:hidden;cursor:grab}
.img-editor-canvas:active{cursor:grabbing}
.img-editor-canvas img{position:absolute;user-select:none;-webkit-user-drag:none}
/* 8个调整手柄 */
.img-editor-handle{position:absolute;width:12px;height:12px;background:#fff;border:2px solid var(--accent);z-index:10;border-radius:2px}
.img-editor-handle.h-tl{top:-6px;left:-6px;cursor:nwse-resize}
.img-editor-handle.h-tr{top:-6px;right:-6px;cursor:nesw-resize}
.img-editor-handle.h-bl{bottom:-6px;left:-6px;cursor:nesw-resize}
.img-editor-handle.h-br{bottom:-6px;right:-6px;cursor:nwse-resize}
.img-editor-handle.h-t{top:-6px;left:50%;transform:translateX(-50%);cursor:ns-resize}
.img-editor-handle.h-b{bottom:-6px;left:50%;transform:translateX(-50%);cursor:ns-resize}
.img-editor-handle.h-l{top:50%;left:-6px;transform:translateY(-50%);cursor:ew-resize}
.img-editor-handle.h-r{top:50%;right:-6px;transform:translateY(-50%);cursor:ew-resize}
.img-toolbar{display:flex;gap:6px;margin-top:8px;justify-content:center}
.token-input{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;width:100%;font-family:monospace;outline:none}
.token-input:focus{border-color:var(--accent)}
.status-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;font-size:13px;z-index:100}
.toast{position:fixed;top:80px;right:24px;padding:14px 22px;border-radius:10px;font-size:14px;font-weight:600;z-index:10000;transform:translateX(120%);transition:transform .3s}
.toast.show{transform:translateX(0)}
.toast-success{background:var(--green);color:#fff}
.toast-error{background:var(--red);color:#fff}
.toast-info{background:var(--blue);color:#fff}
.publish-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:10000;display:flex;align-items:center;justify-content:center}
.publish-modal{background:var(--bg2);border:1px solid var(--accent);border-radius:16px;padding:30px;max-width:480px;width:90%}
.publish-modal h2{text-align:center;margin-bottom:20px}
.publish-log{background:var(--bg);border-radius:8px;padding:14px;max-height:260px;overflow-y:auto;font-family:monospace;font-size:13px;line-height:1.6;color:var(--text2)}
.publish-log .ok{color:var(--green)}.publish-log .err{color:var(--red)}.publish-log .info{color:var(--blue)}
@media(max-width:768px){.layout{flex-direction:column}.sidebar{width:100%;display:flex;overflow-x:auto;padding:8px}.nav-item{padding:8px 14px;white-space:nowrap;border-left:none;border-bottom:2px solid transparent}.nav-item.active{border-bottom-color:var(--accent);border-left-color:transparent}.form-row,.form-row-4{grid-template-columns:1fr}}
</style>

// ========== 状态管理 ==========
let siteData = {};
function loadData(){
    const saved = localStorage.getItem('neecai_admin_data');
    const defaults = JSON.parse(JSON.stringify(DEFAULT_DATA));
    if(saved){
        siteData = JSON.parse(saved);
        // 合并新字段：如果旧数据缺少新模块，用默认值补全
        if(!siteData.advantages) siteData.advantages = defaults.advantages;
        if(!siteData.testimonials) siteData.testimonials = defaults.testimonials;
        if(!siteData.form) siteData.form = defaults.form;
        if(!siteData.popup) siteData.popup = defaults.popup;
    } else {
        siteData = defaults;
    }
}
function saveData(){
    localStorage.setItem('neecai_admin_data', JSON.stringify(siteData));
    document.getElementById('lastSave').textContent = '已保存 ' + new Date().toLocaleTimeString();
}
loadData();

// ========== 导航 ==========
document.querySelectorAll('.nav-item').forEach(item=>{
    item.addEventListener('click',()=>{
        document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
        item.classList.add('active');
        renderPanel(item.dataset.panel);
    });
});

function renderPanel(name){
    const main = document.getElementById('mainContent');
    const renderers = {products:renderProducts, solutions:renderSolutions, cases:renderCases, hero:renderHero, about:renderAbout, advantages:renderAdvantages, testimonials:renderTestimonials, contact:renderContact, form:renderForm, settings:renderSettings};
    if(renderers[name]) renderers[name](main);
}

// ========== 通用组件 ==========
function langTabs(prefix){
    return `<div class="lang-tabs" id="lt_${prefix}">${LANGS.map((l,i)=>`<button class="lang-tab${i===0?' active':''}" data-lang="${l}" onclick="switchLang('${prefix}','${l}')">${LANG_NAMES[l]}</button>`).join('')}</div>`;
}

function switchLang(prefix, lang){
    const tabs = document.getElementById('lt_'+prefix);
    tabs.querySelectorAll('.lang-tab').forEach(t=>t.classList.toggle('active',t.dataset.lang===lang));
    tabs.parentElement.querySelectorAll('[data-lang-field]').forEach(el=>{
        el.style.display = el.dataset.langField===lang ? '' : 'none';
    });
}

function inputGroup(label, id, value, lang, multiline){
    const display = lang ? '' : '';
    if(multiline) return `<div class="form-group" ${lang?`data-lang-field="${lang}"`:''}><label>${label}</label><textarea id="${id}" data-key="${id}">${value||''}</textarea></div>`;
    return `<div class="form-group" ${lang?`data-lang-field="${lang}"`:''}><label>${label}</label><input type="text" id="${id}" value="${escHtml(value||'')}" data-key="${id}"></div>`;
}

function handleImgUpload(id, input){
    const file = input.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(e){
        compressImage(e.target.result, 500, function(compressedData){
            // 用新图片替换编辑器区域
            const wrapper = document.getElementById('iu_'+id) || document.getElementById('ie_'+id);
            const parent = wrapper ? wrapper.parentElement : null;
            if(!parent) return;
            const w = 240, h = 160;
            parent.innerHTML = `
            <div class="img-editor" id="ie_${id}">
                <div class="img-editor-header">
                    <div class="img-editor-info"><i class="fas fa-arrows-alt"></i> 拖拽移动 &nbsp; <i class="fas fa-expand-arrows-alt"></i> 拖角调整大小</div>
                    <div id="iedim_${id}" style="font-weight:700">${w} × ${h}</div>
                </div>
                <div class="img-editor-canvas" id="iec_${id}">
                    <img src="${compressedData}" id="ieimg_${id}" style="left:10px;top:10px;width:${w}px;height:${h}px">
                    <div class="img-editor-handle h-tl" data-dir="tl"></div>
                    <div class="img-editor-handle h-tr" data-dir="tr"></div>
                    <div class="img-editor-handle h-bl" data-dir="bl"></div>
                    <div class="img-editor-handle h-br" data-dir="br"></div>
                    <div class="img-editor-handle h-t" data-dir="t"></div>
                    <div class="img-editor-handle h-b" data-dir="b"></div>
                    <div class="img-editor-handle h-l" data-dir="l"></div>
                    <div class="img-editor-handle h-r" data-dir="r"></div>
                </div>
            </div>
            <div class="img-toolbar">
                <button class="btn btn-secondary" style="font-size:12px;padding:4px 10px" onclick="document.getElementById('if_${id}').click()"><i class="fas fa-exchange-alt"></i> 更换图片</button>
                <button class="btn btn-danger" style="font-size:12px;padding:4px 10px" onclick="removeImg('${id}')"><i class="fas fa-trash"></i> 删除</button>
            </div>
            <input type="file" id="if_${id}" accept="image/*" onchange="handleImgUpload('${id}',this)" style="display:none">`;
            parent.dataset.imgData = compressedData;
            parent.dataset.newImg = 'true';
            initImgEditor(id);
            const sizeKB = Math.round(compressedData.length * 3 / 4 / 1024);
            showToast('图片已压缩至 ' + sizeKB + 'KB','success');
        });
    };
    reader.readAsDataURL(file);
}

// 图片压缩：自动调整质量，确保输出 < maxKB KB
function compressImage(dataUrl, maxKB, callback){
    const img = new Image();
    img.onload = function(){
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        let w = img.width, h = img.height;
        const maxDim = 1920;
        if(w > maxDim || h > maxDim){
            if(w > h){ h = Math.round(h * maxDim / w); w = maxDim; }
            else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        canvas.width = w; canvas.height = h;
        ctx.drawImage(img, 0, 0, w, h);
        let quality = 0.85;
        let result = canvas.toDataURL('image/jpeg', quality);
        let sizeKB = result.length * 3 / 4 / 1024;
        if(sizeKB <= maxKB){ callback(result); return; }
        while(sizeKB > maxKB && quality > 0.1){
            quality -= 0.1;
            result = canvas.toDataURL('image/jpeg', quality);
            sizeKB = result.length * 3 / 4 / 1024;
        }
        if(sizeKB > maxKB){
            const scale = Math.sqrt(maxKB / sizeKB);
            canvas.width = Math.round(w * scale);
            canvas.height = Math.round(h * scale);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            result = canvas.toDataURL('image/jpeg', 0.7);
        }
        callback(result);
    };
    img.src = dataUrl;
}

function removeImg(id){
    const editor = document.getElementById('ie_'+id);
    const parent = editor ? editor.parentElement : null;
    if(!parent) return;
    parent.innerHTML = `<div class="img-upload" id="iu_${id}" onclick="document.getElementById('if_${id}').click()">
        <input type="file" id="if_${id}" accept="image/*" onchange="handleImgUpload('${id}',this)">
        <i class="fas fa-cloud-upload-alt"></i><p>点击上传图片</p>
    </div>`;
    parent.dataset.imgRemoved = 'true';
    delete parent.dataset.imgData;
}

// ========== 图片编辑器：拖拽移动 + 拖角调整大小 ==========
function initImgEditor(id){
    const canvas = document.getElementById('iec_'+id);
    const img = document.getElementById('ieimg_'+id);
    const dimLabel = document.getElementById('iedim_'+id);
    if(!canvas || !img) return;

    // 读取图片当前状态
    function getImgState(){
        return {
            x: parseInt(img.style.left) || 0,
            y: parseInt(img.style.top) || 0,
            w: parseInt(img.style.width) || img.naturalWidth || 200,
            h: parseInt(img.style.height) || img.naturalHeight || 150
        };
    }

    function setImgState(s){
        img.style.left = s.x + 'px';
        img.style.top = s.y + 'px';
        img.style.width = s.w + 'px';
        img.style.height = s.h + 'px';
        if(dimLabel) dimLabel.textContent = Math.round(s.w) + ' × ' + Math.round(s.h);
    }

    // --- 拖拽移动图片 ---
    let isDragging = false, dragStartX, dragStartY, origState;

    img.addEventListener('mousedown', function(e){
        if(e.target.classList.contains('img-editor-handle')) return;
        e.preventDefault();
        isDragging = true;
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        origState = getImgState();
    });

    // 触摸拖拽
    img.addEventListener('touchstart', function(e){
        if(e.target.classList.contains('img-editor-handle')) return;
        e.preventDefault();
        isDragging = true;
        const t = e.touches[0];
        dragStartX = t.clientX;
        dragStartY = t.clientY;
        origState = getImgState();
    });

    function onDragMove(clientX, clientY){
        if(!isDragging) return;
        const dx = clientX - dragStartX;
        const dy = clientY - dragStartY;
        setImgState({ x: origState.x + dx, y: origState.y + dy, w: origState.w, h: origState.h });
    }

    document.addEventListener('mousemove', function(e){ onDragMove(e.clientX, e.clientY); });
    document.addEventListener('touchmove', function(e){ if(isDragging){ e.preventDefault(); onDragMove(e.touches[0].clientX, e.touches[0].clientY); } }, {passive:false});

    function onDragEnd(){ isDragging = false; isResizing = false; }
    document.addEventListener('mouseup', onDragEnd);
    document.addEventListener('touchend', onDragEnd);

    // --- 拖角调整大小 ---
    let isResizing = false, resizeDir;

    canvas.querySelectorAll('.img-editor-handle').forEach(handle => {
        handle.addEventListener('mousedown', function(e){
            e.preventDefault();
            e.stopPropagation();
            isResizing = true;
            resizeDir = handle.dataset.dir;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            origState = getImgState();
        });
        handle.addEventListener('touchstart', function(e){
            e.preventDefault();
            e.stopPropagation();
            isResizing = true;
            resizeDir = handle.dataset.dir;
            const t = e.touches[0];
            dragStartX = t.clientX;
            dragStartY = t.clientY;
            origState = getImgState();
        });
    });

    document.addEventListener('mousemove', onResizeMove);
    document.addEventListener('touchmove', function(e){
        if(isResizing){ e.preventDefault(); onResizeMove(e.touches[0]); }
    }, {passive:false});

    function onResizeMove(e){
        if(!isResizing) return;
        const clientX = e.clientX || 0;
        const clientY = e.clientY || 0;
        const dx = clientX - dragStartX;
        const dy = clientY - dragStartY;
        let s = {...origState};

        switch(resizeDir){
            case 'br': s.w += dx; s.h += dy; break;
            case 'bl': s.x += dx; s.w -= dx; s.h += dy; break;
            case 'tr': s.y += dy; s.w += dx; s.h -= dy; break;
            case 'tl': s.x += dx; s.y += dy; s.w -= dx; s.h -= dy; break;
            case 'r': s.w += dx; break;
            case 'l': s.x += dx; s.w -= dx; break;
            case 'b': s.h += dy; break;
            case 't': s.y += dy; s.h -= dy; break;
        }
        // 最小尺寸
        if(s.w < 40){ if(resizeDir.includes('l')) s.x = origState.x + origState.w - 40; s.w = 40; }
        if(s.h < 30){ if(resizeDir.includes('t')) s.y = origState.y + origState.h - 30; s.h = 30; }

        setImgState(s);
    }
}


function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function removeProduct(i){

    siteData.products.splice(i,1);
    saveData();
    renderProducts(document.getElementById('mainContent'));
    showToast('产品已删除','info');
}

function saveProducts(){
    siteData.products.forEach((p,i)=>{
        p.id = document.getElementById('prod_id_'+i)?.value || p.id;
        p.icon = document.getElementById('prod_icon_'+i)?.value || p.icon;
        // 读取图片数据
        const parent = document.getElementById('ie_prod_'+p.id)?.parentElement;
        if(parent){
            if(parent.dataset.imgData) p.img = parent.dataset.imgData;
            if(parent.dataset.imgRemoved) p.img = '';
        }
        // 读取编辑器中的图片尺寸和位置
        const imgEl = document.getElementById('ieimg_prod_'+p.id);
        if(imgEl){
            p.imgWidth = parseInt(imgEl.style.width) || 0;
            p.imgHeight = parseInt(imgEl.style.height) || 0;
            p.imgX = parseInt(imgEl.style.left) || 0;
            p.imgY = parseInt(imgEl.style.top) || 0;
        }
        LANGS.forEach(l=>{
            p[l].title = document.getElementById('prod_'+i+'_'+l+'_title')?.value || p[l].title;
            p[l].desc = document.getElementById('prod_'+i+'_'+l+'_desc')?.value || p[l].desc;
            p[l].f1 = document.getElementById('prod_'+i+'_'+l+'_f1')?.value || p[l].f1;
            p[l].f2 = document.getElementById('prod_'+i+'_'+l+'_f2')?.value || p[l].f2;
            p[l].f3 = document.getElementById('prod_'+i+'_'+l+'_f3')?.value || p[l].f3;
        });
    });
    saveData();
    showToast('产品数据已保存','success');
}

// ========== Toast ==========
function showToast(msg, type){
    const t = document.createElement('div');
    t.className = 'toast toast-'+type;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(()=>t.classList.add('show'),50);

}

// ========== 一键发布 ==========
async function startPublish(){
    if(!siteData.settings.githubToken){showToast('请先在发布设置中填写 GitHub Token','error');return;}
    const overlay = document.createElement('div');
    overlay.className = 'publish-overlay';
    overlay.innerHTML = `<div class="publish-modal"><h2><i class="fas fa-rocket" style="color:var(--accent)"></i> 正在发布...</h2><div class="publish-log" id="pubLog"></div><div style="text-align:right;margin-top:16px"><button class="btn btn-secondary" onclick="this.closest('.publish-overlay').remove()">关闭</button></div></div>`;
    document.body.appendChild(overlay);
    const log = document.getElementById('pubLog');

    function addLog(msg, type='info'){log.innerHTML += `<div class="${type}">${msg}</div>`;log.scrollTop=log.scrollHeight;}

    try{
        const token = siteData.settings.githubToken;
        const repo = siteData.settings.repo;
        const branch = siteData.settings.branch;
        const headers = {'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'};

        // 1. 生成新的 script.js
        addLog('正在生成网站文件...','info');
        const newJS = generateScriptJS();
        const newHTML = await generateIndexHTML();

        // 2. 获取当前文件的 SHA
        addLog('获取 GitHub 仓库信息...','info');
        async function getFileSHA(path){
            const r = await fetch(`https://api.github.com/repos/${repo}/contents/${path}?ref=${branch}`, {headers});
            if(r.ok){const d=await r.json();return d.sha;}
            return null;
        }

        // 3. 上传图片
        let imgCount = 0;
        for(const p of siteData.products){
            if(p.img && p.img.startsWith('data:')){
                const imgPath = `images/product_${p.id}.${p.img.includes('png')?'png':'jpg'}`;
                addLog(`上传图片: ${imgPath}`,'info');
                const sha = await getFileSHA(imgPath);
                const body = {message:'上传产品图片 '+p.id, content: p.img.split(',')[1], branch};
                if(sha) body.sha = sha;
                const r = await fetch(`https://api.github.com/repos/${repo}/contents/${imgPath}`,{method:'PUT',headers,body:JSON.stringify(body)});
                if(r.ok){addLog(`  ✓ ${imgPath} 上传成功`,'ok');p.img=`/${imgPath}`;imgCount++;}
                else{const e=await r.json();addLog(`  ✗ ${imgPath} 上传失败: ${e.message}`,'err');}
            }
        }
        for(const c of siteData.cases){
            if(c.img && c.img.startsWith('data:')){
                const imgPath = `images/case_${c.id}.${c.img.includes('png')?'png':'jpg'}`;
                addLog(`上传图片: ${imgPath}`,'info');
                const sha = await getFileSHA(imgPath);
                const body = {message:'上传案例图片 '+c.id, content: c.img.split(',')[1], branch};
                if(sha) body.sha = sha;
                const r = await fetch(`https://api.github.com/repos/${repo}/contents/${imgPath}`,{method:'PUT',headers,body:JSON.stringify(body)});
                if(r.ok){addLog(`  ✓ ${imgPath} 上传成功`,'ok');c.img=`/${imgPath}`;imgCount++;}
                else{const e=await r.json();addLog(`  ✗ ${imgPath} 上传失败: ${e.message}`,'err');}
            }
        }
        if(imgCount) saveData();

        // 4. 推送 script.js
        addLog('推送 script.js...','info');
        const jsSHA = await getFileSHA('script.js');
        const jsBody = {message:'更新网站内容 (admin)', content: btoa(unescape(encodeURIComponent(newJS))), branch};
        if(jsSHA) jsBody.sha = jsSHA;
        const jsR = await fetch(`https://api.github.com/repos/${repo}/contents/script.js`,{method:'PUT',headers,body:JSON.stringify(jsBody)});
        if(jsR.ok) addLog('✓ script.js 推送成功','ok');
        else{const e=await jsR.json();addLog('✗ script.js 推送失败: '+e.message,'err');throw new Error('script.js push failed');}

        // 5. 推送 index.html
        addLog('推送 index.html...','info');
        const htmlSHA = await getFileSHA('index.html');
        const htmlBody = {message:'更新网站页面 (admin)', content: btoa(unescape(encodeURIComponent(newHTML))), branch};
        if(htmlSHA) htmlBody.sha = htmlSHA;
        const htmlR = await fetch(`https://api.github.com/repos/${repo}/contents/index.html`,{method:'PUT',headers,body:JSON.stringify(htmlBody)});

function getJSLogic(){
    return `
    // ========== 语言切换 ==========
    let currentLang = localStorage.getItem('neecai_lang') || 'zh';
    function applyLang(lang) {
        currentLang = lang;
        localStorage.setItem('neecai_lang', lang);
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (translations[lang] && translations[lang][key]) el.innerHTML = translations[lang][key];
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            const key = el.getAttribute('data-i18n-placeholder');
            if (translations[lang] && translations[lang][key]) el.placeholder = translations[lang][key];
        });
        document.documentElement.lang = lang === 'zh' ? 'zh-CN' : lang;
        const titles = {zh:'霓彩舞台设备 | Neecai - www.neecai.net',en:'Neecai Stage Effects - www.neecai.net',es:'Neecai Efectos Escénicos - www.neecai.net',pt:'Neecai Efeitos Cênicos - www.neecai.net'};
        document.title = titles[lang] || titles.en;
        document.getElementById('currentLang') && (document.getElementById('currentLang').textContent = {zh:'中文',en:'English',es:'Español',pt:'Português'}[lang]);
        document.querySelectorAll('.lang-option').forEach(o => o.classList.toggle('active', o.dataset.lang === lang));
    }
    applyLang(currentLang);
    document.querySelectorAll('.lang-option').forEach(btn => btn.addEventListener('click', () => applyLang(btn.dataset.lang)));
    const langBtn = document.getElementById('langBtn'), langDropdown = document.getElementById('langDropdown');
    if(langBtn) langBtn.addEventListener('click', () => langDropdown.classList.toggle('show'));
    document.addEventListener('click', e => { if (!e.target.closest('.lang-switcher') && langDropdown) langDropdown.classList.remove('show'); });

    // ========== 粒子背景 ==========
    const canvas = document.getElementById('particles-canvas');
    if(canvas){const ctx=canvas.getContext('2d');function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}resize();window.addEventListener('resize',resize);const particles=[];for(let i=0;i<60;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,r:Math.random()*2+0.5,a:Math.random()*0.3+0.1});}function drawParticles(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>canvas.width)p.vx*=-1;if(p.y<0||p.y>canvas.height)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(255,107,53,'+p.a+')';ctx.fill();});requestAnimationFrame(drawParticles);}drawParticles();}

    // ========== 数字动画 ==========
    const observer = new IntersectionObserver(entries => {entries.forEach(entry => {if(entry.isIntersecting){entry.target.querySelectorAll('.stat-number').forEach(el=>{const target=parseInt(el.dataset.target);let current=0;const step=target/60;const timer=setInterval(()=>{current+=step;if(current>=target){current=target;clearInterval(timer);}el.textContent=Math.floor(current);},25);});observer.unobserve(entry.target);}});});document.querySelector('.hero-stats') && observer.observe(document.querySelector('.hero-stats'));

    // ========== 解决方案 Tab ==========
    document.querySelectorAll('.tab-btn').forEach(btn => {btn.addEventListener('click', () => {document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));btn.classList.add('active');const panel = document.getElementById(btn.dataset.tab);if(panel) panel.classList.add('active');});});

    // ========== 滚动动画 ==========
    const scrollObserver = new IntersectionObserver(entries => {entries.forEach(entry => {if(entry.isIntersecting){entry.target.classList.add('revealed');scrollObserver.unobserve(entry.target);}});},{threshold:0.1});document.querySelectorAll('.product-card, .advantage-card, .case-card, .testimonial-card').forEach(el => {el.classList.add('scroll-reveal');scrollObserver.observe(el);});

    // ========== 导航栏滚动 ==========
    window.addEventListener('scroll', () => {const navbar = document.getElementById('navbar');if(navbar) navbar.classList.toggle('scrolled', window.scrollY > 50);});

    // ========== 回到顶部 ==========
    const backToTop = document.getElementById('backToTop');if(backToTop){window.addEventListener('scroll', () => backToTop.classList.toggle('visible', window.scrollY > 500));backToTop.addEventListener('click', () => window.scrollTo({top:0,behavior:'smooth'}));}

    // ========== 联系表单 ==========
    const contactForm = document.getElementById('contactForm');if(contactForm){contactForm.addEventListener('submit', e => {e.preventDefault();const btn=contactForm.querySelector('.btn-submit');const orig=btn.innerHTML;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i>';btn.style.opacity='0.7';btn.style.pointerEvents='none';setTimeout(()=>{btn.innerHTML='<span>\\u2713</span><i class="fas fa-check"></i>';btn.style.background='linear-gradient(135deg, #06d6a0, #118ab2)';setTimeout(()=>{btn.innerHTML=orig;btn.style.opacity='1';btn.style.pointerEvents='auto';btn.style.background='';e.target.reset();},2000);},1500);});}

    // ========== 产品卡片交互 ==========
    document.querySelectorAll('.product-card').forEach(card => {card.addEventListener('mousemove', e => {const rect=card.getBoundingClientRect();const visual=card.querySelector('.product-visual');if(visual) visual.style.background='radial-gradient(circle at '+(e.clientX-rect.left)+'px '+(e.clientY-rect.top)+'px, rgba(255,107,53,0.08), transparent 50%)';});card.addEventListener('mouseleave', () => {const v=card.querySelector('.product-visual');if(v) v.style.background='';});});

    // ========== 鼠标跟随 ==========
    const heroSection = document.querySelector('.hero');if(heroSection){heroSection.addEventListener('mousemove', e => {const x=e.clientX/window.innerWidth, y=e.clientY/window.innerHeight;heroSection.querySelectorAll('.light-beam').forEach((beam, i) => {beam.style.transform='translate('+((x-0.5)*10*(i+1))+'px, '+((y-0.5)*5*(i+1))+'px) rotate('+((x-0.5)*20)+'deg)';});});}

    // ========== 平滑滚动 ==========
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {anchor.addEventListener('click', function(e) {e.preventDefault();const target=document.querySelector(this.getAttribute('href'));if(target) window.scrollTo({top:target.offsetTop-80,behavior:'smooth'});});});
`;
}

// ========== 生成 index.html ==========
async function generateIndexHTML(){
    // Fetch the current index.html as template
    const response = await fetch('index.html');
    let html = await response.text();

    // Update product images - write image path into src attribute
    siteData.products.forEach(p => {
        const imgKey = `data-product-img="${p.id}"`;
        if(p.img && !p.img.startsWith('data:')){
            // Has image: set src, add width/height, remove display:none
            const w = p.imgWidth ? ` width="${p.imgWidth}"` : '';
            const h = p.imgHeight ? ` height="${p.imgHeight}"` : '';
            html = html.replace(
                new RegExp(`<img class="product-img" ${imgKey.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')} src=""[^>]*>`),
                `<img class="product-img" data-product-img="${p.id}" src="${p.img}" alt="${p.zh.title}"${w}${h}>`
            );
        } else if(!p.img || p.img === ''){
            // No image: keep src="" and display:none
            html = html.replace(
                new RegExp(`<img class="product-img" ${imgKey.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')} src="[^"]*"[^>]*>`),
                `<img class="product-img" data-product-img="${p.id}" src="" alt="" style="display:none">`
            );
        }
    });

    // Update case images
    siteData.cases.forEach(c => {
        if(c.img && !c.img.startsWith('data:')){
            // Find the case card by its tag and add background image
            // Cases use CSS background, so we add inline style
        }
    });

    // Update stat numbers
    html = html.replace(/data-target="15"/, `data-target="${siteData.stats.years}"`);
    html = html.replace(/data-target="3000"/, `data-target="${siteData.stats.projects}"`);
    html = html.replace(/data-target="50"/, `data-target="${siteData.stats.countries}"`);
    html = html.replace(/data-target="36"/, `data-target="${siteData.stats.patents}"`);

    // Update contact info
    html = html.replace(/href="tel:[^"]*"/, `href="tel:${siteData.contact.phone}"`);
    html = html.replace(/href="mailto:[^"]*"/, `href="mailto:${siteData.contact.email}"`);

    // Update version for cache busting
    const ver = Date.now();
    html = html.replace(/style\.css\?v=\d+/, `style.css?v=${ver}`);
    html = html.replace(/script\.js\?v=\d+/, `script.js?v=${ver}`);

    return html;
}
