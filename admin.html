<html lang="zh-CN">
<head>

<title>Neecai 网站管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--accent:#ff6b35;--accent2:#ff8c42;--blue:#38bdf8;--green:#22c55e;--red:#ef4444;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--border:#475569;--radius:10px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:20px;display:flex;align-items:center;gap:10px}
.header h1 i{color:var(--accent);font-size:22px}
.header-actions{display:flex;gap:10px;align-items:center}
.btn{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-success{background:var(--green);color:#fff}.btn-success:hover{opacity:.9}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{opacity:.9}
.btn-secondary{background:var(--bg3);color:var(--text)}.btn-secondary:hover{background:var(--border)}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{opacity:.9}
.layout{display:flex;min-height:calc(100vh - 60px)}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);padding:12px 0;flex-shrink:0}
.nav-item{padding:12px 20px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text2);transition:all .2s;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,107,53,.06);color:var(--text)}
.nav-item.active{background:rgba(255,107,53,.1);color:var(--accent);border-left-color:var(--accent)}
.nav-item i{width:18px;text-align:center;font-size:15px}
.main{flex:1;padding:24px;padding-bottom:60px;overflow-y:auto;max-height:calc(100vh - 60px)}
.panel{display:none}.panel.active{display:block}
.panel-title{font-size:22px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.panel-title i{color:var(--accent)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;cursor:pointer}
.card-header h3{font-size:16px;display:flex;align-items:center;gap:8px}
.card-header h3 i{color:var(--accent);font-size:14px}
.card-toggle{color:var(--text3);font-size:12px}
.card-body{display:grid;gap:14px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;color:var(--text2);font-weight:600}
.form-group input,.form-group textarea,.form-group select{padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border .2s}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--accent)}
.form-group textarea{resize:vertical;min-height:60px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-row-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}
.lang-tabs{display:flex;gap:4px;margin-bottom:12px;background:var(--bg);border-radius:8px;padding:4px}
.lang-tab{padding:6px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;background:transparent;color:var(--text3);transition:all .2s}
.lang-tab.active{background:var(--accent);color:#fff}
.img-upload{border:2px dashed var(--border);border-radius:var(--radius);padding:24px;text-align:center;cursor:pointer;transition:all .2s;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.img-upload:hover{border-color:var(--accent);background:rgba(255,107,53,.04)}
.img-upload input{display:none}
.img-upload i.fa-cloud-upload-alt{font-size:28px;color:var(--text3);margin-bottom:8px}
.img-upload p{font-size:13px;color:var(--text3)}
/* 图片编辑器 */
.img-editor{border:2px solid var(--accent);border-radius:12px;overflow:hidden;margin:8px 0;position:relative}
.img-editor-canvas{position:relative;width:100%;height:220px;background:repeating-conic-gradient(#1e293b 0% 25%,#0f172a 0% 50%) 50%/16px 16px;overflow:hidden;cursor:grab}
.img-editor-canvas:active{cursor:grabbing}
.img-editor-canvas img{position:absolute;user-select:none;-webkit-user-drag:none}
/* 顶部透明工具栏 */
.img-editor-header{position:absolute;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:linear-gradient(180deg,rgba(0,0,0,.65) 0%,rgba(0,0,0,.25) 70%,transparent 100%);font-size:11px;color:rgba(255,255,255,.85);pointer-events:none;transition:opacity .3s}
.img-editor:hover .img-editor-header{opacity:1}
.img-editor-header .img-editor-info{pointer-events:auto;display:flex;align-items:center;gap:8px}
.img-editor-header .img-editor-info i{color:var(--accent2);font-size:11px}
/* 8个调整手柄 */
.img-editor-handle{position:absolute;width:14px;height:14px;background:rgba(255,255,255,.9);border:2px solid var(--accent);z-index:10;border-radius:3px;box-shadow:0 1px 4px rgba(0,0,0,.4)}
.img-editor-handle.h-tl{top:-7px;left:-7px;cursor:nwse-resize}
.img-editor-handle.h-tr{top:-7px;right:-7px;cursor:nesw-resize}
.img-editor-handle.h-bl{bottom:-7px;left:-7px;cursor:nesw-resize}
.img-editor-handle.h-br{bottom:-7px;right:-7px;cursor:nwse-resize}
.img-editor-handle.h-t{top:-7px;left:50%;transform:translateX(-50%);cursor:ns-resize}
.img-editor-handle.h-b{bottom:-7px;left:50%;transform:translateX(-50%);cursor:ns-resize}
.img-editor-handle.h-l{top:50%;left:-7px;transform:translateY(-50%);cursor:ew-resize}
.img-editor-handle.h-r{top:50%;right:-7px;transform:translateY(-50%);cursor:ew-resize}
.img-toolbar{display:flex;gap:6px;margin-top:8px;justify-content:center}
.token-input{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;width:100%;font-family:monospace;outline:none}
.token-input:focus{border-color:var(--accent)}
.status-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:8px 24px;display:flex;align-items:center;justify-content:space-between;font-size:12px;z-index:100;height:36px}
.auto-save-indicator{display:inline-flex;align-items:center;gap:5px;color:var(--green);opacity:0;transition:opacity .3s;font-size:12px;margin-left:12px}
.auto-save-indicator.show{opacity:1}
.toast{position:fixed;top:80px;right:24px;padding:14px 22px;border-radius:10px;font-size:14px;font-weight:600;z-index:10000;transform:translateX(120%);transition:transform .3s}
.toast.show{transform:translateX(0)}
.toast-success{background:var(--green);color:#fff}
.toast-error{background:var(--red);color:#fff}
.toast-info{background:var(--blue);color:#fff}
.publish-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:10000;display:flex;align-items:center;justify-content:center}
.publish-modal{background:var(--bg2);border:1px solid var(--accent);border-radius:16px;padding:30px;max-width:480px;width:90%}
.publish-modal h2{text-align:center;margin-bottom:20px}
.publish-log{background:var(--bg);border-radius:8px;padding:14px;max-height:260px;overflow-y:auto;font-family:monospace;font-size:13px;line-height:1.6;color:var(--text2)}
.publish-log .ok{color:var(--green)}.publish-log .err{color:var(--red)}.publish-log .info{color:var(--blue)}
/* 登录页 */
.login-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);z-index:10000;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;width:380px;max-width:90%;text-align:center}
.login-box h2{margin-bottom:8px;font-size:22px;display:flex;align-items:center;justify-content:center;gap:10px}
.login-box h2 i{color:var(--accent)}
.login-box p{color:var(--text3);font-size:13px;margin-bottom:24px}
.login-box .form-group{text-align:left;margin-bottom:16px}
.login-box .form-group label{font-size:12px;color:var(--text2);font-weight:600;margin-bottom:4px;display:block}
.login-box .form-group input{width:100%;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;transition:border .2s}
.login-box .form-group input:focus{border-color:var(--accent)}
.login-box .btn{width:100%;justify-content:center;padding:12px;font-size:15px;margin-top:8px}
.login-error{color:var(--red);font-size:13px;margin-top:10px;display:none}
@media(max-width:768px){.layout{flex-direction:column}.sidebar{width:100%;display:flex;overflow-x:auto;padding:8px}.nav-item{padding:8px 14px;white-space:nowrap;border-left:none;border-bottom:2px solid transparent}.nav-item.active{border-bottom-color:var(--accent);border-left-color:transparent}.form-row,.form-row-4{grid-template-columns:1fr}}
/* 产品下拉目录管理 */
.dropdown-toggle{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:14px;color:var(--text);margin-bottom:12px}
.dropdown-toggle:hover{border-color:var(--accent)}
.dropdown-toggle i{color:var(--text3);transition:transform .2s}
.dropdown-toggle.open i{transform:rotate(180deg)}
.dropdown-list{display:none;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.dropdown-list.show{display:block}
.dropdown-item{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg);transition:background .2s}
.dropdown-item:last-child{border-bottom:none}
.dropdown-item:hover{background:rgba(255,107,53,.06)}
.dropdown-item .drag-handle{color:var(--text3);cursor:grab;font-size:14px;min-width:20px}
.dropdown-item .item-icon{color:var(--accent);font-size:14px;min-width:20px}
.dropdown-item .item-info{flex:1;display:flex;flex-direction:column;gap:2px}
.dropdown-item .item-info span{font-size:14px;color:var(--text)}
.dropdown-item .item-info small{font-size:11px;color:var(--text3)}
.dropdown-item .item-actions{display:flex;gap:6px}
.dropdown-item .btn-icon{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text3);cursor:pointer;font-size:12px;transition:all .2s}
.dropdown-item .btn-icon:hover{background:var(--bg3);color:var(--text)}
.dropdown-item .btn-icon.delete:hover{background:rgba(239,68,68,.15);color:var(--red);border-color:var(--red)}
.dropdown-item-edit{display:none;padding:16px;background:var(--bg);border-bottom:1px solid var(--border)}
.dropdown-item-edit.show{display:block}
.dropdown-empty{text-align:center;padding:30px;color:var(--text3);font-size:14px}
</style>

<script>
// ========== 登录验证 ==========
const AUTH_USER = 'neecai';
const AUTH_PASS_HASH = 'a3d2f8c1e5b9047d6e8f2a1c3b5d7e9f'; // 简单混淆，非明文

// 简单哈希函数
function simpleHash(str){
    let h = 0;
    for(let i = 0; i < str.length; i++){
        h = ((h << 5) - h) + str.charCodeAt(i);
        h = h & h;
    }
    return h.toString(16).padStart(8, '0') + 'd6e8f2a1c3b5d7e9f';
}

function checkAuth(){
    const session = sessionStorage.getItem('neecai_auth');
    if(session === 'ok'){
        document.getElementById('loginOverlay').style.display = 'none';
        return true;
    }
    document.getElementById('loginOverlay').style.display = 'flex';
    return false;
}

function doLogin(){
    const user = document.getElementById('loginUser').value.trim();
    const pass = document.getElementById('loginPass').value;
    if(user === AUTH_USER && pass === '591816883'){
        sessionStorage.setItem('neecai_auth', 'ok');
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('loginError').style.display = 'none';
    } else {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('loginPass').value = '';
    }
}

function doLogout(){
    sessionStorage.removeItem('neecai_auth');
    document.getElementById('loginOverlay').style.display = 'flex';
    document.getElementById('loginUser').value = '';
    document.getElementById('loginPass').value = '';
    document.getElementById('loginError').style.display = 'none';
}

// 回车登录
document.getElementById('loginPass').addEventListener('keydown', function(e){
    if(e.key === 'Enter') doLogin();
});
document.getElementById('loginUser').addEventListener('keydown', function(e){
    if(e.key === 'Enter') document.getElementById('loginPass').focus();
});

function langTabs(prefix){
    return `<div class="lang-tabs" id="lt_${prefix}">${LANGS.map((l,i)=>`<button class="lang-tab${i===0?' active':''}" data-lang="${l}" onclick="switchLang('${prefix}','${l}')">${LANG_NAMES[l]}</button>`).join('')}</div>`;

function switchLang(prefix, lang){
    const tabs = document.getElementById('lt_'+prefix);
    tabs.querySelectorAll('.lang-tab').forEach(t=>t.classList.toggle('active',t.dataset.lang===lang));
    tabs.parentElement.querySelectorAll('[data-lang-field]').forEach(el=>{
        el.style.display = el.dataset.langField===lang ? '' : 'none';
    });
    // 切换到某语言时，移除该语言 tab 上的翻译小圆点（用户已查看）
    const activeTab = tabs.querySelector(`.lang-tab[data-lang="${lang}"]`);
    if(activeTab){
        const dot = activeTab.querySelector('.trans-dot');
        if(dot) dot.remove();
    }
    // 切换到非中文语言时，给自动翻译的输入框添加视觉提示
    if(lang !== 'zh'){
        const cardBody = tabs.closest('.card-body') || tabs.parentElement;
        cardBody.querySelectorAll(`[data-lang-field="${lang}"] input, [data-lang-field="${lang}"] textarea`).forEach(el => {
            if(el.dataset.autoTrans){
                // 显示蓝色边框提示（切换回来时重新显示）
                el.style.borderColor = '#38bdf8';
                el.style.boxShadow = '0 0 0 1px rgba(56,189,248,0.3)';
                let transTag = el.parentElement.querySelector('.trans-tag');
                if(!transTag){
                    transTag = document.createElement('span');
                    transTag.className = 'trans-tag';
                    transTag.style.cssText = 'font-size:10px;color:#38bdf8;margin-top:1px;display:flex;align-items:center;gap:3px';
                    el.parentElement.appendChild(transTag);
                }
                transTag.innerHTML = '<i class="fas fa-language"></i> 自动翻译（点击编辑覆盖）';
                // 确保有 focus 事件处理
                if(!el.dataset.hasAutoTransFocus){
                    el.dataset.hasAutoTransFocus = 'true';
                    el.addEventListener('focus', function clearHint(){
                        this.style.borderColor = '';
                        this.style.boxShadow = '';
                        delete this.dataset.autoTrans;
                        delete this.dataset.hasAutoTransFocus;
                        this.dataset.userEdited = 'true';
                        const tag = this.parentElement.querySelector('.trans-tag');
                        if(tag) tag.remove();
                        this.removeEventListener('focus', clearHint);
                    });
                }
            }
        });
    }
}

// ========== 自动翻译系统 ==========
const TRANSLATE_CACHE = {};
let translateQueue = [];
let isTranslating = false;
let debounceTimers = {};

// 防抖翻译：输入停止 800ms 后触发
function debounceTranslate(zhId, zhText){
    if(debounceTimers[zhId]) clearTimeout(debounceTimers[zhId]);
    debounceTimers[zhId] = setTimeout(()=>{
        autoTranslate(zhId, zhText);
        delete debounceTimers[zhId];
    }, 800);
}

function autoTranslate(zhId, zhText){
    if(!zhText || zhText.trim().length === 0) return;
    
    const targetLangs = [
        {lang:'en', label:'English', code:'en'},
        {lang:'es', label:'Español', code:'es'},
        {lang:'pt', label:'Português', code:'pt'}
    ];
    
    // 显示翻译状态提示
    showTranslateStatus(zhId, true);
    
    targetLangs.forEach(({lang, label, code}) => {
        // 构建 target ID: 替换 _zh_ 为 _en_ 等
        let targetId = zhId;
        if(zhId.includes('_zh_')){
            targetId = zhId.replace('_zh_', '_'+lang+'_');
        } else if(zhId.endsWith('_zh')){
            // 如 ct_addr_zh → ct_addr_en
            targetId = zhId.replace(/_zh$/, '_'+lang);
        } else {
            targetId = zhId.replace(/_zh([_])/, '_'+lang+'$1');
        }
        
        const targetEl = document.getElementById(targetId);
        if(!targetEl) return;
        // 只有用户手动 focus 编辑过的字段才跳过（dataset.userEdited 标记）
        if(targetEl.dataset.userEdited) return;
        
        // 移除该目标之前可能排队的翻译
        translateQueue = translateQueue.filter(item => item.targetId !== targetId);
        
        // 加入翻译队列
        translateQueue.push({text: zhText, from:'zh-CN', to: code, targetId, label, zhId});
    });
    
    processTranslateQueue();
}

function showTranslateStatus(zhId, show){
    // 在中文输入框旁边显示翻译中提示
    const zhEl = document.getElementById(zhId);
    if(!zhEl) return;
    let statusEl = zhEl.parentElement.querySelector('.trans-status');
    if(show){
        if(!statusEl){
            statusEl = document.createElement('span');
            statusEl.className = 'trans-status';
            statusEl.style.cssText = 'font-size:11px;color:#38bdf8;margin-top:2px;display:flex;align-items:center;gap:4px';
            zhEl.parentElement.appendChild(statusEl);
        }
        statusEl.innerHTML = '<i class="fas fa-spinner fa-spin" style="font-size:10px"></i> 正在自动翻译...';
    } else {
        if(statusEl) statusEl.remove();
    }
}

async function processTranslateQueue(){
    if(isTranslating) return;
    if(translateQueue.length === 0) return;
    isTranslating = true;
    let lastZhId = null;
    
    while(translateQueue.length > 0){
        const item = translateQueue.shift();
        lastZhId = item.zhId;
        const cacheKey = item.from+'|'+item.to+'|'+item.text;
        
        let translated;
        if(TRANSLATE_CACHE[cacheKey]){
            translated = TRANSLATE_CACHE[cacheKey];
        } else {
            try {
                const langPair = item.from+'|'+item.to;
                const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(item.text)}&langpair=${langPair}`;
                const resp = await fetch(url);
                const data = await resp.json();
                if(data.responseStatus === 200 && data.responseData){
                    translated = data.responseData.translatedText;
                    TRANSLATE_CACHE[cacheKey] = translated;
                }
            } catch(e){
                // 翻译失败，跳过
            }
        }
        
        if(translated){
            const targetEl = document.getElementById(item.targetId);
            if(targetEl){
                targetEl.value = translated;
                targetEl.dataset.autoTrans = 'true';
                // 添加视觉提示：浅蓝色边框 + 标记
                targetEl.style.borderColor = '#38bdf8';
                targetEl.style.boxShadow = '0 0 0 1px rgba(56,189,248,0.3)';
                // 在输入框后添加翻译来源标记
                let transTag = targetEl.parentElement.querySelector('.trans-tag');
                if(!transTag){
                    transTag = document.createElement('span');
                    transTag.className = 'trans-tag';
                    transTag.style.cssText = 'font-size:10px;color:#38bdf8;margin-top:1px;display:flex;align-items:center;gap:3px';
                    targetEl.parentElement.appendChild(transTag);
                }
                transTag.innerHTML = '<i class="fas fa-language"></i> 自动翻译（点击编辑覆盖）';
                // 用户手动编辑后恢复样式（避免重复绑定）
                if(!targetEl.dataset.hasAutoTransFocus){
                    targetEl.dataset.hasAutoTransFocus = 'true';
                    targetEl.addEventListener('focus', function clearHint(){
                        this.style.borderColor = '';
                        this.style.boxShadow = '';
                        delete this.dataset.autoTrans;
                        delete this.dataset.hasAutoTransFocus;
                        // 标记为用户手动编辑，后续中文修改不再覆盖
                        this.dataset.userEdited = 'true';
                        const tag = this.parentElement.querySelector('.trans-tag');
                        if(tag) tag.remove();
                        this.removeEventListener('focus', clearHint);
                    });
                }
                // 在对应语言 tab 按钮上添加翻译标记小圆点
                markLangTabTranslated(item.targetId, item.to);
            }
        }
        
        // 避免请求过快
        await new Promise(r => setTimeout(r, 350));
    }
    
    // 翻译完成，移除状态提示
    if(lastZhId) showTranslateStatus(lastZhId, false);
    isTranslating = false;
    
    // 检查是否还有排队任务（可能在翻译过程中新加入的）
    if(translateQueue.length > 0) processTranslateQueue();
}

// 在语言 tab 按钮上标记已自动翻译
function markLangTabTranslated(targetId, langCode){
    // 从 targetId 推算出 lang-tab 的 prefix
    // ID 格式: prefix_index_lang_field 或 prefix_lang_field
    // 需要找到包含该输入框的 card 中的 lang-tabs
    const targetEl = document.getElementById(targetId);
    if(!targetEl) return;
    
    // 向上找到 card-body，然后找 lang-tab
    const cardBody = targetEl.closest('.card-body');
    if(!cardBody) return;
    
    const langTab = cardBody.querySelector(`.lang-tab[data-lang="${langCode}"]`);
    if(!langTab) return;
    
    // 添加翻译小圆点标记
    if(!langTab.querySelector('.trans-dot')){
        const dot = document.createElement('span');
        dot.className = 'trans-dot';
        dot.style.cssText = 'display:inline-block;width:6px;height:6px;background:#38bdf8;border-radius:50%;margin-left:4px;vertical-align:middle';
        dot.title = '已自动翻译';
        langTab.appendChild(dot);
    }
}

                const canvasW = 400; // 大致编辑框宽度

                        <div class="img-editor-handle h-tr" data-dir="tr"></div>
                        <div class="img-editor-handle h-bl" data-dir="bl"></div>

        });

    reader.readAsDataURL(file);
}

// 图片压缩：自动调整质量，确保输出 < maxKB KB
function compressImage(dataUrl, maxKB, callback){
    const img = new Image();
    img.onload = function(){
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        let w = img.width, h = img.height;
        const maxDim = 1920;
        if(w > maxDim || h > maxDim){
            if(w > h){ h = Math.round(h * maxDim / w); w = maxDim; }
            else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        canvas.width = w; canvas.height = h;
        ctx.drawImage(img, 0, 0, w, h);
        let quality = 0.85;
        let result = canvas.toDataURL('image/jpeg', quality);
        let sizeKB = result.length * 3 / 4 / 1024;
        if(sizeKB <= maxKB){ callback(result); return; }
        while(sizeKB > maxKB && quality > 0.1){
            quality -= 0.1;
            result = canvas.toDataURL('image/jpeg', quality);
            sizeKB = result.length * 3 / 4 / 1024;
        }
        if(sizeKB > maxKB){
            const scale = Math.sqrt(maxKB / sizeKB);
            canvas.width = Math.round(w * scale);
            canvas.height = Math.round(h * scale);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            result = canvas.toDataURL('image/jpeg', 0.7);
        }
        callback(result);
    };
    img.src = dataUrl;
}

// ========== 图片编辑器：拖拽移动 + 拖角调整大小 ==========
function initImgEditor(id){
    const canvas = document.getElementById('iec_'+id);
    const img = document.getElementById('ieimg_'+id);
    const dimLabel = document.getElementById('iedim_'+id);
    if(!canvas || !img) return;

    // 如果图片是自适应模式（无保存尺寸），等加载后计算填满编辑框
    if(img.style.width === '100%' || (!parseInt(img.style.width) && !parseInt(img.style.height))){
        function fitToCanvas(){
            const cw = canvas.clientWidth;
            const ch = canvas.clientHeight;
            const iw = img.naturalWidth || cw;
            const ih = img.naturalHeight || ch;
            if(iw <= 0 || ih <= 0) return;
            const ratio = Math.max(cw / iw, ch / ih);
            const w = Math.round(iw * ratio);
            const h = Math.round(ih * ratio);
            const left = Math.round((cw - w) / 2);
            const top = Math.round((ch - h) / 2);
            img.style.width = w + 'px';
            img.style.height = h + 'px';
            img.style.left = left + 'px';
            img.style.top = top + 'px';
            img.style.objectFit = '';
            if(dimLabel) dimLabel.textContent = w + ' × ' + h;
        }
        if(img.naturalWidth) fitToCanvas();
        else img.addEventListener('load', fitToCanvas, {once:true});
    }

    // 读取图片当前状态
    function getImgState(){
        return {
            x: parseInt(img.style.left) || 0,
            y: parseInt(img.style.top) || 0,
            w: parseInt(img.style.width) || img.naturalWidth || 200,
            h: parseInt(img.style.height) || img.naturalHeight || 150
        };
    }

    function setImgState(s){
        img.style.left = s.x + 'px';
        img.style.top = s.y + 'px';
        img.style.width = s.w + 'px';
        img.style.height = s.h + 'px';
        if(dimLabel) dimLabel.textContent = Math.round(s.w) + ' × ' + Math.round(s.h);
    }

    // --- 拖拽移动图片 ---
    let isDragging = false, dragStartX, dragStartY, origState;

    img.addEventListener('mousedown', function(e){
        if(e.target.classList.contains('img-editor-handle')) return;
        e.preventDefault();
        isDragging = true;
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        origState = getImgState();
    });

    // 触摸拖拽
    img.addEventListener('touchstart', function(e){
        if(e.target.classList.contains('img-editor-handle')) return;
        e.preventDefault();
        isDragging = true;
        const t = e.touches[0];
        dragStartX = t.clientX;
        dragStartY = t.clientY;
        origState = getImgState();
    });

    function onDragMove(clientX, clientY){
        if(!isDragging) return;
        const dx = clientX - dragStartX;
        const dy = clientY - dragStartY;
        setImgState({ x: origState.x + dx, y: origState.y + dy, w: origState.w, h: origState.h });
    }

    document.addEventListener('mousemove', function(e){ onDragMove(e.clientX, e.clientY); });
    document.addEventListener('touchmove', function(e){ if(isDragging){ e.preventDefault(); onDragMove(e.touches[0].clientX, e.touches[0].clientY); } }, {passive:false});

    function onDragEnd(){ isDragging = false; isResizing = false; autoSave(); }
    document.addEventListener('mouseup', onDragEnd);
    document.addEventListener('touchend', onDragEnd);

    // --- 拖角调整大小 ---
    let isResizing = false, resizeDir;

    canvas.querySelectorAll('.img-editor-handle').forEach(handle => {
        handle.addEventListener('mousedown', function(e){
            e.preventDefault();
            e.stopPropagation();
            isResizing = true;
            resizeDir = handle.dataset.dir;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            origState = getImgState();
        });
        handle.addEventListener('touchstart', function(e){
            e.preventDefault();
            e.stopPropagation();
            isResizing = true;
            resizeDir = handle.dataset.dir;
            const t = e.touches[0];
            dragStartX = t.clientX;
            dragStartY = t.clientY;
            origState = getImgState();
        });
    });

    document.addEventListener('mousemove', onResizeMove);
    document.addEventListener('touchmove', function(e){
        if(isResizing){ e.preventDefault(); onResizeMove(e.touches[0]); }
    }, {passive:false});

    function onResizeMove(e){
        if(!isResizing) return;
        const clientX = e.clientX || 0;
        const clientY = e.clientY || 0;
        const dx = clientX - dragStartX;
        const dy = clientY - dragStartY;
        let s = {...origState};

        switch(resizeDir){
            case 'br': s.w += dx; s.h += dy; break;
            case 'bl': s.x += dx; s.w -= dx; s.h += dy; break;
            case 'tr': s.y += dy; s.w += dx; s.h -= dy; break;
            case 'tl': s.x += dx; s.y += dy; s.w -= dx; s.h -= dy; break;
            case 'r': s.w += dx; break;
            case 'l': s.x += dx; s.w -= dx; break;
            case 'b': s.h += dy; break;
            case 't': s.y += dy; s.h -= dy; break;
        }
        // 最小尺寸
        if(s.w < 40){ if(resizeDir.includes('l')) s.x = origState.x + origState.w - 40; s.w = 40; }
        if(s.h < 30){ if(resizeDir.includes('t')) s.y = origState.y + origState.h - 30; s.h = 30; }

        setImgState(s);
    }
}

    siteData.navbar.productDropdown.splice(idx,1);
    saveData();
    renderNavbar(document.getElementById('mainContent'));
    showToast('目录项已删除','info');

function moveDropdownItem(idx, dir){
    const items = siteData.navbar.productDropdown;
    const newIdx = idx + dir;
    if(newIdx < 0 || newIdx >= items.length) return;
    [items[idx], items[newIdx]] = [items[newIdx], items[idx]];
    saveData();
    renderNavbar(document.getElementById('mainContent'));
}

function editDropdownItem(idx){
    document.querySelectorAll('.dropdown-item-edit').forEach(el => el.classList.remove('show'));
    const editEl = document.getElementById('dropdownEdit_' + idx);
    if(editEl) editEl.classList.add('show');
}

function cancelDropdownItem(idx){
    const editEl = document.getElementById('dropdownEdit_' + idx);
    if(editEl) editEl.classList.remove('show');
}

function saveDropdownItem(idx){
    const item = siteData.navbar.productDropdown[idx];

// 一键翻译所有模块
async function translateAllModules(){
    const btn = document.getElementById('btnTranslateAll');
    const logEl = document.getElementById('translateAllLog');
    if(!btn || !logEl) return;
    
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 翻译中...';
    logEl.style.display = 'block';
    logEl.innerHTML = '';
    
    // 收集当前页面所有中文输入框
    const zhInputs = document.querySelectorAll('input[data-auto-trans-src], textarea[data-auto-trans-src]');
    // 也通过 onchange/oninput 属性检测
    const allInputs = document.querySelectorAll('input[oninput*="debounceTranslate"], textarea[oninput*="debounceTranslate"]');
    
    if(allInputs.length === 0){
        logEl.innerHTML = '<span style="color:var(--text3)">未找到可翻译的中文内容。请先切换到具体模块页面。</span>';
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-globe"></i> 一键翻译所有模块';
        return;
    }
    
    logEl.innerHTML += `<div style="color:var(--blue)">找到 ${allInputs.length} 个中文输入框，开始翻译...</div>`;
    
    let translated = 0;
    let skipped = 0;
    
    for(const input of allInputs){
        const val = input.value || '';
        if(!val.trim()){
            skipped++;
            continue;
        }
        const id = input.id;
        logEl.innerHTML += `<div>翻译: ${id} = "${val.substring(0,30)}${val.length>30?'...':''}"</div>`;
        logEl.scrollTop = logEl.scrollHeight;
        
        autoTranslate(id, val);
        
        // 等待翻译完成（简单等待）
        await new Promise(r => setTimeout(r, 1200));
        translated++;
    }
    
    // 等待队列处理完成
    await new Promise(r => setTimeout(r, 2000));
    
    logEl.innerHTML += `<div style="color:var(--green);margin-top:8px;font-weight:600">✓ 翻译完成！已翻译 ${translated} 项，跳过空值 ${skipped} 项</div>`;
    logEl.innerHTML += `<div style="color:var(--text3);margin-top:4px">切换到对应语言 tab 查看翻译结果。点击输入框可手动修改。</div>`;
    
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-globe"></i> 一键翻译所有模块';
    showToast('翻译完成！','success');
}

// ========== Toast ==========
function showToast(msg, type){
    const t = document.createElement('div');
    t.className = 'toast toast-'+type;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(()=>t.classList.add('show'),50);
    setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},2500);
}

// ========== 一键发布 ==========
async function startPublish(){
    if(!siteData.settings.githubToken){showToast('请先在发布设置中填写 GitHub Token','error');return;}
    const overlay = document.createElement('div');
    overlay.className = 'publish-overlay';
    overlay.innerHTML = `<div class="publish-modal"><h2><i class="fas fa-rocket" style="color:var(--accent)"></i> 正在发布...</h2><div class="publish-log" id="pubLog"></div><div style="text-align:right;margin-top:16px"><button class="btn btn-secondary" onclick="this.closest('.publish-overlay').remove()">关闭</button></div></div>`;
    document.body.appendChild(overlay);
    const log = document.getElementById('pubLog');

    function addLog(msg, type='info'){log.innerHTML += `<div class="${type}">${msg}</div>`;log.scrollTop=log.scrollHeight;}

    try{
        const token = siteData.settings.githubToken;
        const repo = siteData.settings.repo;
        const branch = siteData.settings.branch;
        const headers = {'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'};

        // 1. 生成新的 script.js（不依赖图片路径）
        addLog('正在生成网站文件...','info');
        const newJS = generateScriptJS();

        // 2. 获取当前文件的 SHA
        addLog('获取 GitHub 仓库信息...','info');
        async function getFileSHA(path){
            const r = await fetch(`https://api.github.com/repos/${repo}/contents/${path}?ref=${branch}`, {headers});
            if(r.ok){const d=await r.json();return d.sha;}
            return null;
        }

        // 3. 上传图片
        let imgCount = 0;
        for(const p of siteData.products){
            if(p.img && p.img.startsWith('data:')){
                const imgPath = `images/product_${p.id}.${p.img.includes('png')?'png':'jpg'}`;
                addLog(`上传图片: ${imgPath}`,'info');
                const sha = await getFileSHA(imgPath);
                const body = {message:'上传产品图片 '+p.id, content: p.img.split(',')[1], branch};
                if(sha) body.sha = sha;
                const r = await fetch(`https://api.github.com/repos/${repo}/contents/${imgPath}`,{method:'PUT',headers,body:JSON.stringify(body)});
                if(r.ok){addLog(`  ✓ ${imgPath} 上传成功`,'ok');p.img=`/${imgPath}`;imgCount++;}
                else{const e=await r.json();addLog(`  ✗ ${imgPath} 上传失败: ${e.message}`,'err');}
            }
        }
        for(const c of siteData.cases){
            if(c.img && c.img.startsWith('data:')){
                const imgPath = `images/case_${c.id}.${c.img.includes('png')?'png':'jpg'}`;
                addLog(`上传图片: ${imgPath}`,'info');
                const sha = await getFileSHA(imgPath);
                const body = {message:'上传案例图片 '+c.id, content: c.img.split(',')[1], branch};
                if(sha) body.sha = sha;
                const r = await fetch(`https://api.github.com/repos/${repo}/contents/${imgPath}`,{method:'PUT',headers,body:JSON.stringify(body)});
                if(r.ok){addLog(`  ✓ ${imgPath} 上传成功`,'ok');c.img=`/${imgPath}`;imgCount++;}
                else{const e=await r.json();addLog(`  ✗ ${imgPath} 上传失败: ${e.message}`,'err');}
            }
        }
        // 上传 Logo 图片
        if(siteData.navbar.logo_img && siteData.navbar.logo_img.startsWith('data:')){
            const imgPath = `images/logo.${siteData.navbar.logo_img.includes('png')?'png':'jpg'}`;
            addLog(`上传 Logo 图片: ${imgPath}`,'info');
            const sha = await getFileSHA(imgPath);
            const body = {message:'上传 Logo 图片', content: siteData.navbar.logo_img.split(',')[1], branch};
            if(sha) body.sha = sha;
            const r = await fetch(`https://api.github.com/repos/${repo}/contents/${imgPath}`,{method:'PUT',headers,body:JSON.stringify(body)});
            if(r.ok){addLog(`  ✓ ${imgPath} 上传成功`,'ok');siteData.navbar.logo_img=`/${imgPath}`;imgCount++;}
            else{const e=await r.json();addLog(`  ✗ ${imgPath} 上传失败: ${e.message}`,'err');}
        }
        if(imgCount) saveData();

        // 4. 生成 index.html（在图片上传后，这样路径已是 /images/xxx）
        addLog('生成 index.html...','info');
        const newHTML = await generateIndexHTML();

        // 5. 推送 script.js
        addLog('推送 script.js...','info');
        const jsSHA = await getFileSHA('script.js');
        const jsBody = {message:'更新网站内容 (admin)', content: btoa(unescape(encodeURIComponent(newJS))), branch};
        if(jsSHA) jsBody.sha = jsSHA;
        const jsR = await fetch(`https://api.github.com/repos/${repo}/contents/script.js`,{method:'PUT',headers,body:JSON.stringify(jsBody)});
        if(jsR.ok) addLog('✓ script.js 推送成功','ok');
        else{const e=await jsR.json();addLog('✗ script.js 推送失败: '+e.message,'err');throw new Error('script.js push failed');}

        // 6. 推送 index.html
        addLog('推送 index.html...','info');
        const htmlSHA = await getFileSHA('index.html');
        const htmlBody = {message:'更新网站页面 (admin)', content: btoa(unescape(encodeURIComponent(newHTML))), branch};
        if(htmlSHA) htmlBody.sha = htmlSHA;
        const htmlR = await fetch(`https://api.github.com/repos/${repo}/contents/index.html`,{method:'PUT',headers,body:JSON.stringify(htmlBody)});
        if(htmlR.ok) addLog('✓ index.html 推送成功','ok');
        else{const e=await htmlR.json();addLog('✗ index.html 推送失败: '+e.message,'err');throw new Error('index.html push failed');}

        addLog('','info');
        addLog('🎉 发布完成！Cloudflare 将在 1-2 分钟内自动部署更新。','ok');
        addLog('访问 https://www.neecai.net 查看效果','info');
    }catch(err){
        addLog('发布出错: '+err.message,'err');
    }
}

function aLead(s){return s.replace(/<br>/g,'\\n').replace(/<strong>/g,'').replace(/<\/strong>/g,'');}

function getJSLogic(){
    return `
    // ========== 语言切换 ==========
    let currentLang = localStorage.getItem('neecai_lang') || 'zh';
    function applyLang(lang) {
        currentLang = lang;
        localStorage.setItem('neecai_lang', lang);
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (translations[lang] && translations[lang][key]) el.innerHTML = translations[lang][key];
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            const key = el.getAttribute('data-i18n-placeholder');
            if (translations[lang] && translations[lang][key]) el.placeholder = translations[lang][key];
        });
        document.documentElement.lang = lang === 'zh' ? 'zh-CN' : lang;
        const titles = {zh:'霓彩舞台设备 | Neecai - www.neecai.net',en:'Neecai Stage Effects - www.neecai.net',es:'Neecai Efectos Escénicos - www.neecai.net',pt:'Neecai Efeitos Cênicos - www.neecai.net'};
        document.title = titles[lang] || titles.en;
        document.getElementById('currentLang') && (document.getElementById('currentLang').textContent = {zh:'中文',en:'English',es:'Español',pt:'Português'}[lang]);
        document.querySelectorAll('.lang-option').forEach(o => o.classList.toggle('active', o.dataset.lang === lang));
    }
    applyLang(currentLang);
    document.querySelectorAll('.lang-option').forEach(btn => btn.addEventListener('click', () => applyLang(btn.dataset.lang)));
    const langBtn = document.getElementById('langBtn'), langDropdown = document.getElementById('langDropdown');
    if(langBtn) langBtn.addEventListener('click', () => langDropdown.classList.toggle('show'));
    document.addEventListener('click', e => { if (!e.target.closest('.lang-switcher') && langDropdown) langDropdown.classList.remove('show'); });

    // ========== 粒子背景 ==========
    const canvas = document.getElementById('particles-canvas');
    if(canvas){const ctx=canvas.getContext('2d');function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}resize();window.addEventListener('resize',resize);const particles=[];for(let i=0;i<60;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,r:Math.random()*2+0.5,a:Math.random()*0.3+0.1});}function drawParticles(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>canvas.width)p.vx*=-1;if(p.y<0||p.y>canvas.height)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(255,107,53,'+p.a+')';ctx.fill();});requestAnimationFrame(drawParticles);}drawParticles();}

    // ========== 数字动画 ==========
    const observer = new IntersectionObserver(entries => {entries.forEach(entry => {if(entry.isIntersecting){entry.target.querySelectorAll('.stat-number').forEach(el=>{const target=parseInt(el.dataset.target);let current=0;const step=target/60;const timer=setInterval(()=>{current+=step;if(current>=target){current=target;clearInterval(timer);}el.textContent=Math.floor(current);},25);});observer.unobserve(entry.target);}});});document.querySelector('.hero-stats') && observer.observe(document.querySelector('.hero-stats'));

    // ========== 解决方案 Tab ==========
    document.querySelectorAll('.tab-btn').forEach(btn => {btn.addEventListener('click', () => {document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));btn.classList.add('active');const panel = document.getElementById(btn.dataset.tab);if(panel) panel.classList.add('active');});});

    // ========== 滚动动画 ==========
    const scrollObserver = new IntersectionObserver(entries => {entries.forEach(entry => {if(entry.isIntersecting){entry.target.classList.add('revealed');scrollObserver.unobserve(entry.target);}});},{threshold:0.1});document.querySelectorAll('.product-card, .advantage-card, .case-card, .testimonial-card').forEach(el => {el.classList.add('scroll-reveal');scrollObserver.observe(el);});

    // ========== 导航栏滚动 ==========
    window.addEventListener('scroll', () => {const navbar = document.getElementById('navbar');if(navbar) navbar.classList.toggle('scrolled', window.scrollY > 50);});

    // ========== 回到顶部 ==========
    const backToTop = document.getElementById('backToTop');if(backToTop){window.addEventListener('scroll', () => backToTop.classList.toggle('visible', window.scrollY > 500));backToTop.addEventListener('click', () => window.scrollTo({top:0,behavior:'smooth'}));}

    // ========== 联系表单 ==========
    const contactForm = document.getElementById('contactForm');if(contactForm){contactForm.addEventListener('submit', e => {e.preventDefault();const btn=contactForm.querySelector('.btn-submit');const orig=btn.innerHTML;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i>';btn.style.opacity='0.7';btn.style.pointerEvents='none';setTimeout(()=>{btn.innerHTML='<span>\\u2713</span><i class="fas fa-check"></i>';btn.style.background='linear-gradient(135deg, #06d6a0, #118ab2)';setTimeout(()=>{btn.innerHTML=orig;btn.style.opacity='1';btn.style.pointerEvents='auto';btn.style.background='';e.target.reset();},2000);},1500);});}

    // ========== 产品卡片交互 ==========
    document.querySelectorAll('.product-card').forEach(card => {card.addEventListener('mousemove', e => {const rect=card.getBoundingClientRect();const visual=card.querySelector('.product-visual');if(visual) visual.style.background='radial-gradient(circle at '+(e.clientX-rect.left)+'px '+(e.clientY-rect.top)+'px, rgba(255,107,53,0.08), transparent 50%)';});card.addEventListener('mouseleave', () => {const v=card.querySelector('.product-visual');if(v) v.style.background='';});});

    // ========== 鼠标跟随 ==========
    const heroSection = document.querySelector('.hero');if(heroSection){heroSection.addEventListener('mousemove', e => {const x=e.clientX/window.innerWidth, y=e.clientY/window.innerHeight;heroSection.querySelectorAll('.light-beam').forEach((beam, i) => {beam.style.transform='translate('+((x-0.5)*10*(i+1))+'px, '+((y-0.5)*5*(i+1))+'px) rotate('+((x-0.5)*20)+'deg)';});});}

    // ========== 产品下拉菜单 ==========
    const hasDropdown = document.querySelector('.has-dropdown');
    const dropdownMenu = document.getElementById('productDropdown');
    if(hasDropdown && dropdownMenu){
        let ddTimer;
        hasDropdown.addEventListener('mouseenter', () => { clearTimeout(ddTimer); dropdownMenu.classList.add('show'); });
        hasDropdown.addEventListener('mouseleave', () => { ddTimer = setTimeout(() => dropdownMenu.classList.remove('show'), 150); });
        // 移动端：点击切换
        hasDropdown.querySelector('a')?.addEventListener('click', function(e) {
            if(window.innerWidth <= 768) { e.preventDefault(); dropdownMenu.classList.toggle('show'); }
        });
    }
    document.addEventListener('click', e => { if(dropdownMenu && !e.target.closest('.has-dropdown')) dropdownMenu.classList.remove('show'); });

    // ========== 平滑滚动 ==========
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {anchor.addEventListener('click', function(e) {e.preventDefault();const target=document.querySelector(this.getAttribute('href'));if(target) window.scrollTo({top:target.offsetTop-80,behavior:'smooth'});});});
`;
}

async function generateIndexHTML(){
    // Fetch the current index.html as template
    const response = await fetch('index.html');
    let html = await response.text();

    // Update product images - write image path into src attribute
    siteData.products.forEach(p => {
        const imgKey = `data-product-img="${p.id}"`;
        if(p.img && !p.img.startsWith('data:')){
            // Has image: set src, add width/height, remove display:none
            const w = p.imgWidth ? ` width="${p.imgWidth}"` : '';
            const h = p.imgHeight ? ` height="${p.imgHeight}"` : '';
            html = html.replace(
                new RegExp(`<img class="product-img" ${imgKey.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')} src=""[^>]*>`),
                `<img class="product-img" data-product-img="${p.id}" src="${p.img}" alt="${p.zh.title}"${w}${h}>`
            );
        } else if(!p.img || p.img === ''){
            // No image: keep src="" and display:none
            html = html.replace(
                new RegExp(`<img class="product-img" ${imgKey.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')} src="[^"]*"[^>]*>`),
                `<img class="product-img" data-product-img="${p.id}" src="" alt="" style="display:none">`
            );
        }
    });

    // Update case images
    siteData.cases.forEach(c => {
        if(c.img && !c.img.startsWith('data:')){
            // Find the case card by its tag and add background image
            // Cases use CSS background, so we add inline style
        }
    });

    // Update stat numbers
    html = html.replace(/data-target="15"/, `data-target="${siteData.stats.years}"`);
    html = html.replace(/data-target="3000"/, `data-target="${siteData.stats.projects}"`);
    html = html.replace(/data-target="50"/, `data-target="${siteData.stats.countries}"`);
    html = html.replace(/data-target="36"/, `data-target="${siteData.stats.patents}"`);

    // Update contact info
    html = html.replace(/href="tel:[^"]*"/, `href="tel:${siteData.contact.phone}"`);
    html = html.replace(/href="mailto:[^"]*"/, `href="mailto:${siteData.contact.email}"`);
    // Update phone text (not just href)
    html = html.replace(/(<h4[^>]*data-i18n="ct_phone_t"[^>]*>.*?<\/h4>\s*<p>)([\s\S]*?)(<\/p>)/, `$1${siteData.contact.phone}$3`);
    // Update email display text
    html = html.replace(/(<h4[^>]*data-i18n="ct_email_t"[^>]*>.*?<\/h4>\s*<p>)([\s\S]*?)(<\/p>)/, `$1${siteData.contact.email}$3`);
    // Update WhatsApp text
    if(siteData.contact.whatsapp){
        html = html.replace(/(<h4>WhatsApp<\/h4>\s*<p>)([\s\S]*?)(<\/p>)/, `$1${siteData.contact.whatsapp}$3`);
    }

    // Update product dropdown menu in navbar
    const nb = siteData.navbar;
    if(nb.productDropdownEnabled !== false && nb.productDropdown && nb.productDropdown.length > 0){
        const pdItems = nb.productDropdown;
        // Build dropdown HTML: replace <li><a href="#products" data-i18n="nav_products">...</a></li>
        const dropdownHTML = `<li class="has-dropdown"><a href="#products" data-i18n="nav_products">${nb.zh.nav_products || '\u4ea7\u54c1\u4e2d\u5fc3'} <i class="fas fa-chevron-down" style="font-size:10px;margin-left:4px"></i></a><ul class="dropdown-menu" id="productDropdown">` +
            pdItems.map((item, di) => {
                const iconHtml = item.icon ? `<i class="${item.icon}" style="margin-right:8px;opacity:.7"></i>` : '';
                return `<li><a href="${item.href || '#products'}" data-i18n="dd_item_${di}">${iconHtml}${item.zh?.label || ''}</a></li>`;
            }).join('') +
            `</ul></li>`;
        html = html.replace(/<li><a href="#products" data-i18n="nav_products">[\s\S]*?<\/a><\/li>/, dropdownHTML);
    }

    // Update navbar logo
    // Logo 图片：替换文字区域（Neecai霓彩）为图片
    if(nb.logo_img && !nb.logo_img.startsWith('data:')){
        html = html.replace(/<span class="logo-text">[^<]*<span class="logo-accent"[^<]*<\/span><\/span>/g,
            `<span class="logo-text"><img src="${nb.logo_img}" alt="Logo" class="logo-img"></span>`);
    }
    // 如果没有图片，则更新图标 class
    else if(nb.logo_icon){
        html = html.replace(/<span class="logo-icon"><i class="fas[^"]*"><\/i><\/span>/g,
            `<span class="logo-icon"><i class="${nb.logo_icon}"></i></span>`);
    }
    // Update navbar logo text（没有图片时才替换文字）
    if(nb.logo_text && !nb.logo_img){
        html = html.replace(/<span class="logo-text">Neecai/g,
            `<span class="logo-text">${nb.logo_text}`);
    }

    // Update version for cache busting
    const ver = Date.now();
    html = html.replace(/style\.css\?v=\d+/, `style.css?v=${ver}`);
    html = html.replace(/script\.js\?v=\d+/, `script.js?v=${ver}`);

    // Update product select options in both forms
    const popts = siteData.form.product_options;
    if(popts && popts.length > 0){
        // Build new options HTML for page form (第一个select没有name)
        const pageOptions = `<option value="" data-i18n="form_select">${siteData.form.zh.select}</option>\n` +
            popts.map((opt, idx) => `                                <option data-i18n="form_product_opt_${idx}">${opt.zh}</option>`).join('\n');
        // Build new options HTML for popup form (select有name="product")
        const popupOptions = `<option value="" data-i18n="popup_select">${siteData.popup.zh.select}</option>\n` +
            popts.map((opt, idx) => `                                <option data-i18n="form_product_opt_${idx}">${opt.zh}</option>`).join('\n');

        // Replace page form select options
        html = html.replace(
            /<select>\s*<option value="" data-i18n="form_select">[\s\S]*?<\/select>/,
            `<select>\n${pageOptions}\n                            </select>`
        );
        // Replace popup form select options
        html = html.replace(
            /<select name="product">\s*<option value="" data-i18n="popup_select">[\s\S]*?<\/select>/,
            `<select name="product">\n${popupOptions}\n                        </select>`
        );
    }

    return html;
}

// ========== 初始化 ==========
renderPanel('navbar');
</script>
